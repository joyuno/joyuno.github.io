<style>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
<script>
(function () {
  const PRETENDARD = "'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif";

  // 제외 태그 — 날짜성 (YYYY-MM, YYYY, year-YYYY) + 메타 (devblog, til, daily-report 등)
  const EXCLUDE_RE = /^(?:20\d{2}-\d{2}|20\d{2}|year-20\d{2})$/i;
  const EXCLUDE_SET = new Set(['devblog', 'dev-blog', 'til', 'daily-report', 'blog']);
  // 슬러그 토큰에서 추가로 거를 영문 stopword + 노이즈 숫자
  const SLUG_STOP = new Set([
    'vs', 'and', 'or', 'the', 'of', 'for', 'to', 'in', 'on', 'at', 'as', 'is', 'are', 'be', 'by',
    'with', 'a', 'an', 'how', 'why', 'what', 'when', 'use', 'using',
    'dev', 'report', 'daily', 'guide', 'study',
  ]);

  function keepTag(t) {
    const k = (t || '').trim().toLowerCase();
    if (!k) return false;
    if (EXCLUDE_RE.test(k)) return false;
    if (EXCLUDE_SET.has(k)) return false;
    return true;
  }

  // 슬러그(파일명)에서 sub-tag 추출 — front-matter tags 가 너무 generic (ai/trend/news 위주)
  // 이라 슬러그 토큰을 함께 카운트해야 워드클라우드가 풍성해진다.
  // 예: "2026-05-10-v0-boltnew-ui-2026-5-2.md" → ["v0", "boltnew", "ui"]
  function slugKeywords(path) {
    if (!path) return [];
    const slug = String(path).replace(/\.md$/i, '').replace(/^\d{4}-\d{2}-\d{2}-/, '');
    return slug.split(/[-_]+/).map(s => s.toLowerCase().trim()).filter(w => {
      if (!w || w.length < 3) return false;          // 너무 짧은 토큰 제외 (a, ai 등은 어차피 tags 에 있음)
      if (/^\d+$/.test(w)) return false;             // 순수 숫자
      if (EXCLUDE_RE.test(w)) return false;          // 날짜
      if (EXCLUDE_SET.has(w)) return false;          // 메타 태그
      if (SLUG_STOP.has(w)) return false;            // 영문 stopword
      return true;
    });
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  // ISO week key = 그 주의 월요일 날짜 (YYYY-MM-DD)
  function weekKeyOf(iso) {
    const d = new Date(iso + 'T00:00:00Z');
    const day = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() - (day - 1));
    return d.toISOString().slice(0, 10);
  }

  // 두 monday 사이의 모든 주차 키 생성 (연속, 빈 주도 포함)
  function genWeekSequence(firstKey, lastKey) {
    const out = [];
    const cur = new Date(firstKey + 'T00:00:00Z');
    const end = new Date(lastKey + 'T00:00:00Z');
    while (cur <= end) {
      out.push(cur.toISOString().slice(0, 10));
      cur.setUTCDate(cur.getUTCDate() + 7);
    }
    return out;
  }

  function render(posts) {
    const cloudCanvas = document.getElementById('stats-cloud-canvas');
    const cloudEmpty = document.getElementById('stats-cloud-empty');
    const canvas = document.getElementById('stats-trend-chart');

    // Blog 페이지에 해당하는 글들만 분석 — dev-report 카테고리 글은 제외
    // (blog/index.html 의 'unless post.categories contains dev-report' 와 동일 로직)
    const blogOnly = posts.filter(p => {
      const cats = (typeof p.categories === 'string' ? p.categories : '').toLowerCase();
      const catList = cats.split(',').map(s => s.trim());
      return !catList.includes('dev-report');
    });

    // 각 post 의 tags + categories + slug-derived sub-tags 합치기
    // — front-matter tags 만 쓰면 [ai, trend, news] 위주로 ~15종밖에 안 나옴
    // — slug 토큰을 합쳐서 v0/boltnew/kubernetes/fastapi 같은 실질 키워드 확보
    // 글 내부에서는 중복 1회로 통합 (같은 단어 두 번 카운트 방지)
    const items = blogOnly.map(p => {
      const tagsRaw = typeof p.tags === 'string' ? p.tags.split(',') : (p.tags || []);
      const fmTags = tagsRaw.map(t => t.trim()).filter(keepTag);
      const catsRaw = typeof p.categories === 'string' ? p.categories.split(',') : (p.categories || []);
      const cats = catsRaw.map(c => c.trim()).filter(keepTag);
      const slug = slugKeywords(p.path);
      const merged = new Map();   // lowercase → 원본표기 (첫 등장)
      [...fmTags, ...cats, ...slug].forEach(orig => {
        const k = orig.toLowerCase();
        if (!merged.has(k)) merged.set(k, orig);
      });
      return { date: p.date, tags: Array.from(merged.values()) };
    }).filter(p => p.date && p.tags.length);

    if (!items.length) {
      cloudEmpty.textContent = '아직 태그가 충분하지 않아요';
      return;
    }

    // 주별 카운트 + 전체 빈도 + 첫 등장 case
    const byWeek = new Map();
    const totalFreq = new Map();
    const displayCase = new Map();
    items.forEach(p => {
      const wk = weekKeyOf(p.date);
      if (!byWeek.has(wk)) byWeek.set(wk, new Map());
      const wMap = byWeek.get(wk);
      p.tags.forEach(orig => {
        const kw = orig.toLowerCase();
        if (!displayCase.has(kw)) displayCase.set(kw, orig);
        wMap.set(kw, (wMap.get(kw) || 0) + 1);
        totalFreq.set(kw, (totalFreq.get(kw) || 0) + 1);
      });
    });

    // 워드클라우드 — wordcloud2.js 로 Python WordCloud 스타일 렌더 (회전·랜덤 배치·색 다양)
    // slug 토큰까지 합치면 키워드 풀이 ~150종 이상이 되니 top 120 까지 보여 풍성한 cloud.
    const sortedAll = Array.from(totalFreq.entries()).sort((a, b) => b[1] - a[1]);
    const top = sortedAll.slice(0, 120);
    if (!top.length) {
      cloudEmpty.textContent = '표시할 태그가 없어요';
    } else if (typeof WordCloud === 'undefined') {
      cloudEmpty.textContent = 'wordcloud2.js 로드 실패';
    } else {
      cloudEmpty.style.display = 'none';
      // canvas 의 픽셀 해상도를 컨테이너 크기에 맞춤 (HiDPI 대응)
      const wrap = cloudCanvas.parentElement;
      const dpr = window.devicePixelRatio || 1;
      const cw = wrap.clientWidth;
      const ch = wrap.clientHeight;
      cloudCanvas.width  = Math.floor(cw * dpr);
      cloudCanvas.height = Math.floor(ch * dpr);
      cloudCanvas.style.width = cw + 'px';
      cloudCanvas.style.height = ch + 'px';

      // 테마 따라 색 팔레트 (light/dark)
      const isDark = (document.documentElement.getAttribute('data-theme') || 'light') === 'dark';
      const palette = isDark
        ? ['#8fb5ff', '#6c9cfc', '#79e6c0', '#ffd166', '#ff7a90', '#c39bff', '#7ddff5']
        : ['#2563eb', '#1d4ed8', '#0891b2', '#ca8a04', '#e11d48', '#9333ea', '#0284c7'];

      const list = top.map(([kw, cnt]) => [displayCase.get(kw) || kw, cnt]);
      const maxCnt = top[0][1];
      const lnMax = Math.log(maxCnt + 1);

      WordCloud(cloudCanvas, {
        list: list,
        gridSize: Math.max(6, Math.round(8 * dpr)),
        weightFactor: function (size) {
          // log 스케일 — 'trend'·'ai'(수백건) 가 화면을 잡아먹지 않게 압축하고
          // sub-tag(llm/agent/rag/coding 등, 20~25건) 도 30~40px 으로 또렷이 보이게.
          const ratio = Math.log(size + 1) / lnMax;
          return (ratio * 52 + 14) * dpr;
        },
        fontFamily: "'Pretendard Variable', Pretendard, sans-serif",
        color: function () { return palette[Math.floor(Math.random() * palette.length)]; },
        backgroundColor: 'transparent',
        rotateRatio: 0.25,
        rotationSteps: 2,
        shuffle: true,
        minSize: 10 * dpr,
        drawOutOfBound: false,
        shrinkToFit: true,
      });
    }

    // 트렌드 차트 — 상위 5개 태그(전체 빈도 기준), 최근 8주, 빈 주는 0 으로 채움
    if (typeof Chart === 'undefined') {
      canvas.parentElement.innerHTML = '<span class="stats-empty">Chart.js 로드 실패</span>';
      return;
    }

    const allWeeks = Array.from(byWeek.keys()).sort();
    if (allWeeks.length === 0) return;
    const continuousWeeks = genWeekSequence(allWeeks[0], allWeeks[allWeeks.length - 1]);
    const last8 = continuousWeeks.slice(-8);
    const trendKws = sortedAll.slice(0, 10).map(([kw]) => kw);
    if (!trendKws.length) return;

    const PALETTE = [
      { line: '#2563eb', fill: 'rgba(37,99,235,0.12)' },   // 파랑
      { line: '#06b6d4', fill: 'rgba(6,182,212,0.12)' },   // 시안
      { line: '#eab308', fill: 'rgba(234,179,8,0.12)' },   // 노랑
      { line: '#10b981', fill: 'rgba(16,185,129,0.12)' },  // 초록
      { line: '#a855f7', fill: 'rgba(168,85,247,0.12)' },  // 보라
      { line: '#ef4444', fill: 'rgba(239,68,68,0.12)' },   // 빨강
      { line: '#f97316', fill: 'rgba(249,115,22,0.12)' },  // 주황
      { line: '#84cc16', fill: 'rgba(132,204,22,0.12)' },  // 라임
      { line: '#0ea5e9', fill: 'rgba(14,165,233,0.12)' },  // 하늘
      { line: '#ec4899', fill: 'rgba(236,72,153,0.12)' },  // 핑크
    ];

    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const axisColor = isDark ? '#888' : '#666';
    const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';

    new Chart(canvas, {
      type: 'line',
      data: {
        labels: last8.map(w => w.slice(5)),  // "MM-DD"
        datasets: trendKws.map((kw, i) => ({
          label: displayCase.get(kw) || kw,
          data: last8.map(w => (byWeek.get(w) || new Map()).get(kw) || 0),
          borderColor: PALETTE[i].line,
          backgroundColor: PALETTE[i].fill,
          fill: false,
          tension: 0.35,
          pointRadius: 3,
          pointHoverRadius: 6,
          borderWidth: 2,
        })),
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: {
            position: 'top',
            labels: { color: axisColor, font: { family: PRETENDARD, size: 12 }, boxWidth: 10, boxHeight: 10, padding: 12 },
          },
          tooltip: {
            titleFont: { family: PRETENDARD },
            bodyFont: { family: PRETENDARD },
          },
        },
        scales: {
          x: {
            ticks: { color: axisColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 10, font: { family: PRETENDARD } },
            grid: { color: gridColor },
            title: { display: true, text: '주 시작 (월요일)', color: axisColor, font: { family: PRETENDARD, size: 11 } },
          },
          y: { beginAtZero: true, ticks: { precision: 0, color: axisColor, font: { family: PRETENDARD } }, grid: { color: gridColor } },
        },
      },
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    fetch('{{ "/search.json" | relative_url }}')
      .then(r => r.json())
      .then(render)
      .catch(e => {
        console.error('search.json fetch 실패', e);
        document.getElementById('stats-cloud').innerHTML = '<span class="stats-empty">⚠️ 데이터 로드 실패</span>';
      });
    if (typeof lucide !== 'undefined') lucide.createIcons();
  });
})();
</script>
