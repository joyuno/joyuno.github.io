# Jekyll 설정
title: Joyuno's Dev Blog
tagline: AI 활용 개발 회고 + 기술 노트
description: >-
  주니어 AI 엔지니어 joyuno 의 개발 회고 블로그.
  Claude / OpenAI / DeepSeek 등 AI 도구 활용 노하우, 프롬프팅 패턴,
  AI 활용 개발일지(dev-blog) 자동 생성 기록을 매일 공유합니다.
author:
  name: joyuno
  email: joy981017@gmail.com
url: "https://joyuno.github.io"
twitter:
  username: joyuno
  card: summary_large_image
social:
  name: Joyuno
  links:
    - https://github.com/joyuno
    - https://joyuno.github.io

# OG / Twitter 카드 미리보기 기본 이미지 (글에 image 없을 때 fallback)
image: https://github.com/joyuno.png?size=1200
logo: /assets/favicon/oiia-cat.png

# Google Search Console 인증 — jekyll-seo-tag 가 <meta name="google-site-verification"> 자동 생성
google_site_verification: "N4Km-w6A1N5bUPfgFH2ltYmlQO5F5IJ7CCtbHUSlhRQ"

# 빌드 설정
markdown: kramdown
highlighter: rouge

# 컬렉션
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# 기본값
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: joyuno

# 자동 description fallback 위한 excerpt 구분자 (첫 \n\n 까지가 excerpt)
excerpt_separator: "\n\n"

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 페이지
include:
  - _pages

# 제외
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - scripts
  - .github

# 사이트 설정
lang: ko
timezone: Asia/Seoul
