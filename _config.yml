# Jekyll 설정
title: Joyuno's Dev Blog
tagline: AI 활용 개발 회고 + 기술 노트
description: >-
  주니어 AI 엔지니어 joyuno 의 개발 회고 블로그.
  Claude / OpenAI / DeepSeek 등 AI 도구 활용 노하우, 프롬프팅 패턴,
  AI 활용 개발일지(dev-blog) 자동 생성 기록을 매일 공유합니다.
author:
  name: joyuno
  email: joy981017@gmail.com
url: "https://joyuno.github.io"
twitter:
  username: joyuno
  card: summary_large_image
social:
  name: Joyuno
  links:
    - https://github.com/joyuno
# Google Search Console 인증 (사용자 콘솔에서 받은 verification code 를 여기에 박으면
# jekyll-seo-tag 가 <meta name="google-site-verification"> 자동 생성).
# google_site_verification: "<여기에 코드>"

# 빌드 설정
markdown: kramdown
highlighter: rouge

# 컬렉션
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# 기본값
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# 플러그인
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 페이지
include:
  - _pages

# 제외
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - scripts
  - .github

# 사이트 설정
lang: ko
timezone: Asia/Seoul
